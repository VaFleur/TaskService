basePath: /
definitions:
  taskService_internal_domain.PaginatedTasks:
    properties:
      data:
        items:
          $ref: '#/definitions/taskService_internal_domain.Task'
        type: array
      pagination:
        $ref: '#/definitions/taskService_internal_domain.Pagination'
    type: object
  taskService_internal_domain.Pagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  taskService_internal_domain.Task:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  title: Task Service API
  version: "1.0"
paths:
  /tasks:
    get:
      parameters:
      - description: Filter by status (pending, in_progress, done)
        in: query
        name: status
        type: string
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/taskService_internal_domain.PaginatedTasks'
      summary: List tasks
    post:
      consumes:
      - application/json
      parameters:
      - description: Task data
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/taskService_internal_domain.Task'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/taskService_internal_domain.Task'
      summary: Create task
  /tasks/{id}:
    delete:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Task not found
          schema:
            type: string
      summary: Delete task (soft delete)
    get:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/taskService_internal_domain.Task'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Task not found
          schema:
            type: string
      summary: Get task by ID
    put:
      consumes:
      - application/json
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Task data
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/taskService_internal_domain.Task'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/taskService_internal_domain.Task'
        "400":
          description: Invalid request
          schema:
            type: string
        "404":
          description: Task not found
          schema:
            type: string
      summary: Update task
swagger: "2.0"
